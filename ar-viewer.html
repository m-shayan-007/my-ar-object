<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Viewer</title>

  <!-- Google Model Viewer -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      display: block;
    }

    /* Hide the default "View in your space" AR button */
    model-viewer::part(default-ar-button),
    [slot="ar-button"] {
      display: none !important;
    }
  </style>
</head>
<body>

  <model-viewer
    id="ar-viewer"
    src="your-model.glb"
    ios-src="your-model.usdz"
    alt="AR 3D Model"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="auto"
    camera-controls
    touch-action="pan-y"
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    loading="eager"
  >
    <!-- AR button slot left intentionally empty; hidden via CSS above -->
    <button slot="ar-button" style="display:none;" aria-hidden="true"></button>
  </model-viewer>

  <script>
    (function () {
      const modelViewer = document.getElementById('ar-viewer');

      /**
       * Attempts to activate AR. On Android/WebXR this will launch
       * automatically. On iOS, Safari blocks activateAR() unless triggered
       * by a direct user gesture — the USDZ Quick Look session will still
       * open via the normal ar-button flow if the user taps anywhere.
       */
      function tryLaunchAR() {
        if (modelViewer.canActivateAR) {
          modelViewer.activateAR();
        }
      }

      // Primary trigger: fires once the model + scene are fully loaded
      modelViewer.addEventListener('load', function onLoad() {
        modelViewer.removeEventListener('load', onLoad);
        // Small rAF delay ensures the renderer is ready before activating
        requestAnimationFrame(() => requestAnimationFrame(tryLaunchAR));
      });

      // Fallback: if 'load' already fired before this script ran
      if (modelViewer.loaded) {
        requestAnimationFrame(() => requestAnimationFrame(tryLaunchAR));
      }

      /**
       * iOS Safari workaround:
       * Because iOS requires a user gesture to launch Quick Look, we attach
       * a one-time tap listener to the whole page. The first tap anywhere
       * will trigger activateAR(), which opens the USDZ Quick Look viewer.
       */
      function iosTapFallback() {
        document.removeEventListener('touchend', iosTapFallback);
        tryLaunchAR();
      }

      // Only add the iOS fallback if WebXR is NOT available (i.e. likely iOS)
      if (!navigator.xr) {
        document.addEventListener('touchend', iosTapFallback, { once: true });
      }

      // Optional: log AR status events for debugging
      modelViewer.addEventListener('ar-status', (e) => {
        console.log('[AR Status]', e.detail.status);
      });
    })();
  </script>

</body>
</html>
