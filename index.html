<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Viewer</title>
 
  <!-- Google Model Viewer -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
 
  <style>
    /* ─── Reset ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
 
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e; /* deep neutral for 3D view backdrop */
    }
 
    /* ─── Model Viewer ───────────────────────────────────────────── */
    model-viewer {
      width: 100vw;
      height: 100vh;
      display: block;
      --progress-bar-color: #7c3aed;
    }
 
    /* Hide the native floating AR button completely */
    model-viewer::part(default-ar-button),
    [slot="ar-button"] {
      display: none !important;
    }
 
    /* ─── Custom AR Launch Button ────────────────────────────────── */
    #ar-launch-btn {
      display: none; /* shown via JS only when AR is supported */
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
 
      padding: 14px 32px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.4px;
      color: #fff;
      white-space: nowrap;
 
      /* Purple-to-blue gradient */
      background: linear-gradient(135deg, #7c3aed 0%, #2563eb 100%);
      box-shadow: 0 8px 28px rgba(124, 58, 237, 0.55),
                  0 2px 6px rgba(0,0,0,0.3);
 
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
 
    #ar-launch-btn:hover,
    #ar-launch-btn:focus-visible {
      transform: translateX(-50%) translateY(-2px) scale(1.03);
      box-shadow: 0 12px 36px rgba(124, 58, 237, 0.65),
                  0 4px 10px rgba(0,0,0,0.3);
      outline: none;
    }
 
    #ar-launch-btn:active {
      transform: translateX(-50%) scale(0.97);
    }
 
    #ar-launch-btn .btn-icon {
      display: inline-block;
      margin-right: 8px;
      font-size: 18px;
      vertical-align: middle;
      line-height: 1;
    }
 
    /* ─── No-AR Error / Warning Bar ─────────────────────────────── */
    #no-ar-bar {
      display: none; /* shown via JS only when AR is NOT supported */
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 100;
 
      padding: 14px 48px 20px 20px; /* right padding for close btn */
      background: linear-gradient(135deg, #b91c1c 0%, #c2410c 100%);
      color: #fff;
      text-align: center;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.4);
    }
 
    #no-ar-bar .bar-title {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 5px;
    }
 
    #no-ar-bar .bar-icon { font-size: 20px; line-height: 1; }
 
    #no-ar-bar .bar-body {
      font-size: 13px;
      line-height: 1.55;
      opacity: 0.93;
    }
 
    #no-ar-bar .bar-body .urdu {
      display: block;
      margin-top: 3px;
      font-size: 12px;
      opacity: 0.82;
    }
 
    /* Dismiss button */
    #bar-close-btn {
      position: absolute;
      top: 10px;
      right: 14px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.8);
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
      transition: color 0.15s;
    }
    #bar-close-btn:hover { color: #fff; }
  </style>
</head>
<body>
 
  <!-- ── 3D / AR Model Viewer ────────────────────────────────────── -->
  <model-viewer
    id="ar-viewer"
    src="your-model.glb"
    ios-src="your-model.usdz"
    alt="AR 3D Model"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-placement="floor"
    ar-scale="fixed"
    scale="0.01 0.01 0.01"
    bounds="tight"
    camera-controls
    touch-action="none"
    enable-pan
    auto-rotate
    auto-rotate-delay="2000"
    shadow-intensity="1"
    shadow-softness="0.8"
    environment-image="neutral"
    exposure="1"
    loading="eager"
  >
    <!-- Native AR button — hidden via CSS, slot kept for compatibility -->
    <button slot="ar-button" style="display:none;" aria-hidden="true"></button>
  </model-viewer>
 
  <!-- ── Custom AR Launch Button (AR-capable devices only) ─────── -->
  <button id="ar-launch-btn" aria-label="Launch AR Experience">
    <span class="btn-icon" aria-hidden="true">🔮</span>
    Launch AR Experience
  </button>
 
  <!-- ── No-AR Warning Bar (non-AR devices only) ───────────────── -->
  <div id="no-ar-bar" role="alert" aria-live="polite">
    <button id="bar-close-btn" aria-label="Dismiss">✕</button>
    <div class="bar-title">
      <span class="bar-icon" aria-hidden="true">⚠️</span>
      AR Not Supported
    </div>
    <div class="bar-body">
      Your device does not support ARCore. Showing 3D model instead.
      <span class="urdu">Aapka device AR support nahi karta, sirf 3D model dekha ja sakta hai.</span>
    </div>
  </div>
 
  <script>
    (function () {
      const modelViewer = document.getElementById('ar-viewer');
      const arBtn       = document.getElementById('ar-launch-btn');
      const noArBar     = document.getElementById('no-ar-bar');
      const closeBtn    = document.getElementById('bar-close-btn');
 
      /* ── Dismiss bar ────────────────────────────────────────────── */
      closeBtn.addEventListener('click', () => {
        noArBar.style.display = 'none';
      });
 
      /* ── Main AR detection logic ─────────────────────────────────
         canActivateAR is only reliable AFTER the model has loaded.
         We listen for the 'load' event before checking.
      ─────────────────────────────────────────────────────────────── */
      function initARUI() {
        if (modelViewer.canActivateAR) {
          // ✅ AR supported → show the purple launch button
          arBtn.style.display = 'block';
 
          arBtn.addEventListener('click', () => {
            modelViewer.activateAR();
          });
 
          // iOS Quick Look: Safari needs a real user gesture.
          // First tap anywhere on the page will open the USDZ viewer.
          if (!navigator.xr) {
            document.addEventListener('touchend', function iosFallback() {
              document.removeEventListener('touchend', iosFallback);
              modelViewer.activateAR();
            }, { once: true });
          }
 
        } else {
          // ❌ AR not supported → show red bilingual warning bar
          noArBar.style.display = 'block';
        }
      }
 
      // Attach to 'load' event; double rAF gives model-viewer time to
      // resolve AR capability flags before we read them.
      modelViewer.addEventListener('load', function onLoad() {
        modelViewer.removeEventListener('load', onLoad);
        requestAnimationFrame(() => requestAnimationFrame(initARUI));
      });
 
      // Guard: if model was already loaded before this script ran
      if (modelViewer.loaded) {
        requestAnimationFrame(() => requestAnimationFrame(initARUI));
      }
 
      /* ── AR session state → sync button visibility ───────────────
         Hide the button while in AR; restore it if session ends/fails.
      ─────────────────────────────────────────────────────────────── */
      modelViewer.addEventListener('ar-status', (e) => {
        console.log('[AR Status]', e.detail.status);
        switch (e.detail.status) {
          case 'session-started':
            arBtn.style.display = 'none';
            break;
          case 'not-presenting':
          case 'failed':
            if (modelViewer.canActivateAR) arBtn.style.display = 'block';
            break;
        }
      });
    })();
  </script>
 
</body>
</html>
